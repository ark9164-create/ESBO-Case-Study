    </div>
    <div class="filter-chip" id="filterChip">${chip}</div>
    <button onclick="clearFilters()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:0.72rem;padding:4px 10px;cursor:pointer;white-space:nowrap;letter-spacing:0.04em;">✕ Clear</button>
  </div>`;
}

function buildFilterChip() {
  const parts = [];
  if (filterMonth !== 'all') parts.push(fmtMonthLabel(filterMonth));
  if (filterWeek  !== 'all') parts.push(fmtWeekLabel(filterWeek));
  if (filterDate  !== 'all') parts.push(fmtDateLong(filterDate));
  if (filterMinUp !== '')     parts.push('Upsell ≥ $' + filterMinUp);
  if (filterMaxUp !== '')     parts.push('Upsell ≤ $' + filterMaxUp);
  const filtered = getFilteredDates();
  const dateSuffix = filtered.length + ' date' + (filtered.length !== 1 ? 's' : '');
  return (parts.length ? parts.join(' · ') + ' · ' : '') + dateSuffix;
}

function handleFilter(type, val) {
  if      (type === 'month') filterMonth = val;
  else if (type === 'week')  filterWeek  = val;
  else if (type === 'date')  filterDate  = val;
  else if (type === 'minUp') filterMinUp = val;
  else if (type === 'maxUp') filterMaxUp = val;
  applyFilters();
}

function clearFilters() {
  filterMonth = 'all'; filterWeek = 'all'; filterDate = 'all';
  filterMinUp = ''; filterMaxUp = '';
  const fb = document.getElementById('filterBar');
  if (fb) fb.outerHTML = buildFilterBar();
  applyFilters();
}

/* ── SUNSET PRICING COMPARISON (interactive) ───────── */
let OPP_DATA = [];
let OPP_SORT = { col: 'date', dir: 'asc' };
let OPP_VIEW = 'day';       // 'day' | 'week' | 'time'
let OPP_RANK = 'all';       // 'all' | 'lowest' | 'not-lowest' | 'highest'
let OPP_DOW  = 'all';       // 'all' | '0'–'6'
let OPP_TIME = 1110;        // default 6:30 PM = 1110 mins
let OPP_AVAIL_TIMES = [];   // populated from data

function buildOppData(filteredDates) {
  const dayRows = [];
  filteredDates.forEach(d => {
    const metrics = getDayMetrics(d);
    const row = { date: d, esb: null, edge: null, summit: null, totr: null };
    metrics.forEach(m => {
      if (m.noData || !m.highSunset) return;
      row[m.vk] = Math.round(m.highSunset.price_cents / 100);
    });
    if (row.esb == null) return;
    const prices = [row.esb, row.edge, row.summit, row.totr].filter(v => v != null);
    row.rank = [...prices].sort((a, b) => a - b).indexOf(row.esb) + 1;
    row.isLowest = row.rank === 1;
    row.gap = Math.min(...prices.filter(v => v != null && v !== row.esb), 9999) - row.esb;
    if (row.gap === 9999) row.gap = 0;
    const dt = new Date(d + 'T12:00:00');
    row.dow = dt.getDay();
    row.dowLabel = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][row.dow];
    row.label = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const mondayOff = row.dow === 0 ? -6 : 1 - row.dow;
    const mon = new Date(dt); mon.setDate(mon.getDate() + mondayOff);
    row.weekKey = mon.toISOString().slice(0, 10);
    dayRows.push(row);
  });
  return dayRows;
}

function buildTimeRows(filteredDates, targetMins) {
  // For each date, find each venue's price at the target tour time (exact or nearest within 15 min)
  const rows = [];
  filteredDates.forEach(d => {
    const row = { date: d, esb: null, edge: null, summit: null, totr: null, time: null };
    VENUE_KEYS.forEach(vk => {
      const pricedRows = getPricedRows(vk, d);
      // Find exact or nearest within ±15 min
      let best = null, bestDist = 999;
      pricedRows.forEach(r => {
        const dist = Math.abs(r._mins - targetMins);
        if (dist <= 15 && dist < bestDist) { best = r; bestDist = dist; }
      });
      if (best && best.price_cents) {
        row[vk] = Math.round(best.price_cents / 100);
        if (vk === 'esb') row.time = best._mins;
      }
    });
    if (row.esb == null) return;
    const prices = [row.esb, row.edge, row.summit, row.totr].filter(v => v != null);
    row.rank = [...prices].sort((a, b) => a - b).indexOf(row.esb) + 1;
    row.isLowest = row.rank === 1;
    row.gap = Math.min(...prices.filter(v => v != null && v !== row.esb), 9999) - row.esb;
    if (row.gap === 9999) row.gap = 0;
    const dt = new Date(d + 'T12:00:00');
    row.dow = dt.getDay();
    row.dowLabel = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][row.dow];
    row.label = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const mondayOff = row.dow === 0 ? -6 : 1 - row.dow;
    const mon = new Date(dt); mon.setDate(mon.getDate() + mondayOff);
    row.weekKey = mon.toISOString().slice(0, 10);
    rows.push(row);
  });
  return rows;
}

function aggregateWeekRows(dayRows) {
  const buckets = {};
  dayRows.forEach(r => {
    if (!buckets[r.weekKey]) buckets[r.weekKey] = { dates: [], esb: [], edge: [], summit: [], totr: [] };
    buckets[r.weekKey].dates.push(r.date);
    if (r.esb != null) buckets[r.weekKey].esb.push(r.esb);
    if (r.edge != null) buckets[r.weekKey].edge.push(r.edge);
    if (r.summit != null) buckets[r.weekKey].summit.push(r.summit);
    if (r.totr != null) buckets[r.weekKey].totr.push(r.totr);
  });
  const weekRows = [];
  Object.keys(buckets).sort().forEach(wk => {
    const b = buckets[wk];
    const avg = arr => arr.length ? Math.round(arr.reduce((s, v) => s + v, 0) / arr.length) : null;
    const row = {
      date: wk, weekKey: wk,
      esb: avg(b.esb), edge: avg(b.edge), summit: avg(b.summit), totr: avg(b.totr),
      dow: -1, dowLabel: '',
      label: new Date(wk + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      nDates: b.dates.length
    };
    if (row.esb == null) return;
    const prices = [row.esb, row.edge, row.summit, row.totr].filter(v => v != null);
    row.rank = [...prices].sort((a, b2) => a - b2).indexOf(row.esb) + 1;
    row.isLowest = row.rank === 1;
    row.gap = Math.min(...prices.filter(v => v != null && v !== row.esb), 9999) - row.esb;
    if (row.gap === 9999) row.gap = 0;
    weekRows.push(row);
  });
  return weekRows;
}

function buildAvailableTimes(filteredDates) {
  // Find common afternoon tour times across ESB data (15:00–22:00)
  const timeCounts = {};
  filteredDates.forEach(d => {
    const rows = getPricedRows('esb', d);
    rows.forEach(r => {
      if (r._mins >= 900 && r._mins <= 1320 && r.price_cents) {
        timeCounts[r._mins] = (timeCounts[r._mins] || 0) + 1;
      }
    });
  });
  // Only show times that appear on at least 10% of dates
  const threshold = Math.max(1, Math.floor(filteredDates.length * 0.1));
  return Object.entries(timeCounts)
    .filter(([, ct]) => ct >= threshold)
    .map(([m]) => parseInt(m))
    .sort((a, b) => a - b);
}

function getOppSourceRows() {
  if (OPP_VIEW === 'time') {
    return buildTimeRows(getFilteredDates(), OPP_TIME);
  }
  return OPP_DATA;
}

function getOppRows() {
  let source = getOppSourceRows();
  let rows = OPP_VIEW === 'week' ? aggregateWeekRows(source) : [...source];
  if (OPP_VIEW !== 'week' && OPP_DOW !== 'all') {
    rows = rows.filter(r => String(r.dow) === OPP_DOW);
  }
  if (OPP_RANK === 'lowest') rows = rows.filter(r => r.rank === 1);
  else if (OPP_RANK === 'not-lowest') rows = rows.filter(r => r.rank > 1);
  else if (OPP_RANK === 'highest') rows = rows.filter(r => r.rank >= 3);
  const { col, dir } = OPP_SORT;
  const mult = dir === 'asc' ? 1 : -1;
  rows.sort((a, b) => {
    let va = a[col], vb = b[col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (col === 'date' || col === 'label') { va = a.date; vb = b.date; }
    return va < vb ? -1 * mult : va > vb ? 1 * mult : 0;
  });
  return rows;
}

function renderOppTable() {
  const rows = getOppRows();
  const source = getOppSourceRows();
  const allRows = OPP_VIEW === 'week' ? aggregateWeekRows(source) : source;
  const lowestCount = allRows.filter(r => r.isLowest).length;
  const totalCount = allRows.length;

  const dateLabel = OPP_VIEW === 'week' ? 'Week' : 'Date';
  const cols = [
    { key: 'date', label: dateLabel },
    { key: 'esb', label: 'ESB', color: 'var(--esb)' },
    { key: 'edge', label: 'Edge', color: 'var(--edge)' },
    { key: 'summit', label: 'Summit', color: 'var(--summit)' },
    { key: 'totr', label: 'TOR', color: 'var(--totr)' },
    { key: 'gap', label: 'Gap to Next' },
    { key: 'rank', label: 'ESB Rank' }
  ];

  let html = '<table class="opp-table"><thead><tr>';
  cols.forEach(c => {
    const isSorted = OPP_SORT.col === c.key;
    const arrow = isSorted ? (OPP_SORT.dir === 'asc' ? '▲' : '▼') : '▲';
    const cls = isSorted ? ' class="sorted"' : '';
    const style = c.color ? ` style="color:${c.color}"` : '';
    html += `<th${cls}${style} data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  if (!rows.length) {
    html += '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:20px;">No dates match filters</td></tr>';
  }

  rows.forEach(r => {
    const prices = [r.esb, r.edge, r.summit, r.totr].filter(v => v != null);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);

    function pc(vk, val) {
      if (val == null) return '<td style="color:var(--text-dim);">—</td>';
      const isMin = val === minP && prices.length > 1;
      const isMax = val === maxP && prices.length > 1 && maxP !== minP;
      let s = '';
      if (vk === 'esb') {
        if (isMin) s = ' style="color:var(--up);font-weight:700;"';
        else if (isMax) s = ' style="color:var(--down);font-weight:700;"';
        else s = ' style="font-weight:600;"';
      } else {
        if (isMax) s = ' style="color:var(--text-primary);font-weight:600;"';
      }
      return '<td' + s + '>$' + val + '</td>';
    }

    const rankLabel = r.rank === 1 ? 'Lowest' : r.rank === 2 ? '2nd' : r.rank === 3 ? '3rd' : '4th';
    const rankColor = r.rank === 1 ? 'var(--up)' : r.rank >= 3 ? 'var(--down)' : 'var(--text-secondary)';
    const gapStr = r.gap > 0 ? '−$' + r.gap : r.gap < 0 ? '+$' + Math.abs(r.gap) : '$0';
    const gapCls = r.gap > 0 ? 'neg' : r.gap < 0 ? 'pos' : '';

    let dateCell;
    if (OPP_VIEW === 'week') dateCell = `<td>${esc(r.label)}<span class="opp-dow">${r.nDates}d</span></td>`;
    else dateCell = `<td>${esc(r.label)}<span class="opp-dow">${esc(r.dowLabel)}</span></td>`;

    const rowCls = !r.isLowest ? ' class="opp-highlight"' : '';

    html += `<tr${rowCls}>
      ${dateCell}
      ${pc('esb', r.esb)}
      ${pc('edge', r.edge)}
      ${pc('summit', r.summit)}
      ${pc('totr', r.totr)}
      <td><span class="opp-gap ${gapCls}">${gapStr}</span></td>
      <td style="color:${rankColor};font-weight:600;">${rankLabel}</td>
    </tr>`;
  });

  html += '</tbody></table>';

  // Update summary
  const summaryCount = document.getElementById('oppSummaryCount');
  if (summaryCount) {
    const unit = OPP_VIEW === 'week' ? 'weeks' : 'dates';
    summaryCount.textContent = totalCount + ' ' + unit;
  }
  const chipEl = document.getElementById('oppChip');
  if (chipEl) {
    chipEl.textContent = rows.length + ' of ' + totalCount + ' shown';
  }

  return html;
}

function renderWeeklyOpportunity(filteredDates) {
  OPP_DATA = buildOppData(filteredDates);
  OPP_AVAIL_TIMES = buildAvailableTimes(filteredDates);
  if (!OPP_DATA.length) return '';

  // Make sure selected time exists in data
  if (OPP_VIEW === 'time' && OPP_AVAIL_TIMES.length && !OPP_AVAIL_TIMES.includes(OPP_TIME)) {
    // Default to nearest available sunset-area time (~6:30 PM)
    OPP_TIME = OPP_AVAIL_TIMES.reduce((best, t) => Math.abs(t - 1110) < Math.abs(best - 1110) ? t : best, OPP_AVAIL_TIMES[0]);
  }

  const source = getOppSourceRows();
  const allRows = OPP_VIEW === 'week' ? aggregateWeekRows(source) : source;
  const lowestCount = allRows.filter(r => r.isLowest).length;
  const totalCount = allRows.length;
  const unit = OPP_VIEW === 'week' ? 'weeks' : 'dates';

  // DOW filter (day + time views)
  const showDow = OPP_VIEW !== 'week';
  const dowOpts = showDow ? `
    <span class="opp-toolbar-label">Day</span>
    <select class="opp-select" id="oppDow" onchange="OPP_DOW=this.value;document.getElementById('oppTableWrap').innerHTML=renderOppTable();wireOppSort();">
      <option value="all">All days</option>
      <option value="0"${OPP_DOW==='0'?' selected':''}>Sun</option>
      <option value="1"${OPP_DOW==='1'?' selected':''}>Mon</option>
      <option value="2"${OPP_DOW==='2'?' selected':''}>Tue</option>
      <option value="3"${OPP_DOW==='3'?' selected':''}>Wed</option>
      <option value="4"${OPP_DOW==='4'?' selected':''}>Thu</option>
      <option value="5"${OPP_DOW==='5'?' selected':''}>Fri</option>
      <option value="6"${OPP_DOW==='6'?' selected':''}>Sat</option>
    </select>
    <div class="opp-toolbar-sep"></div>` : '';

  // Tour time picker (time view only)
  const timeOpts = OPP_VIEW === 'time' ? `
    <span class="opp-toolbar-label">Tour Time</span>
    <select class="opp-select" id="oppTime" onchange="OPP_TIME=parseInt(this.value);document.getElementById('oppTableWrap').innerHTML=renderOppTable();wireOppSort();">
      ${OPP_AVAIL_TIMES.map(t => `<option value="${t}"${t===OPP_TIME?' selected':''}>${minsToLabel(t)}</option>`).join('')}
    </select>
    <div class="opp-toolbar-sep"></div>` : '';

  return `<details class="opp-panel" id="oppDetails">
    <summary class="opp-summary-bar">
      <div class="opp-summary-left">
        <span class="opp-panel-title">Sunset Pricing Comparison</span>
        <span class="opp-panel-count" id="oppSummaryCount">${totalCount} ${unit}</span>
      </div>
      <svg class="opp-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 4 10 8 6 12"/></svg>
    </summary>
    <div class="opp-panel-body">
      <div class="opp-toolbar" id="oppToolbar">
        <span class="opp-toolbar-label">View</span>
        <div class="opp-toggle-group">
          <button class="opp-toggle-btn${OPP_VIEW==='day'?' active':''}" onclick="OPP_VIEW='day';refreshOppPanel();">By Date</button>
          <button class="opp-toggle-btn${OPP_VIEW==='time'?' active':''}" onclick="OPP_VIEW='time';refreshOppPanel();">By Tour Time</button>
          <button class="opp-toggle-btn${OPP_VIEW==='week'?' active':''}" onclick="OPP_VIEW='week';refreshOppPanel();">By Week</button>
        </div>
        <div class="opp-toolbar-sep"></div>
        ${timeOpts}${dowOpts}
        <span class="opp-toolbar-label">Show</span>
        <select class="opp-select" id="oppRank" onchange="OPP_RANK=this.value;document.getElementById('oppTableWrap').innerHTML=renderOppTable();wireOppSort();">
          <option value="all">All ${unit}</option>
          <option value="lowest"${OPP_RANK==='lowest'?' selected':''}>ESB lowest</option>
          <option value="not-lowest"${OPP_RANK==='not-lowest'?' selected':''}>ESB not lowest</option>
          <option value="highest"${OPP_RANK==='highest'?' selected':''}>ESB highest</option>
        </select>
        <span class="opp-chip" id="oppChip">${totalCount} of ${totalCount} shown</span>
      </div>
      <div id="oppTableWrap">${renderOppTable()}</div>
    </div>
  </details>`;
}

function refreshOppPanel() {
  const el = document.getElementById('weeklyOpp');
  if (!el) return;
  const filtered = getFilteredDates();
  el.innerHTML = renderWeeklyOpportunity(filtered);
  wireOppSort();
}

function wireOppSort() {
  const table = document.querySelector('#oppTableWrap .opp-table');
  if (!table) return;
  table.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (OPP_SORT.col === col) {
        OPP_SORT.dir = OPP_SORT.dir === 'asc' ? 'desc' : 'asc';
      } else {
        OPP_SORT.col = col;
        OPP_SORT.dir = col === 'date' ? 'asc' : 'desc';
      }
      document.getElementById('oppTableWrap').innerHTML = renderOppTable();
      wireOppSort();
    });
  });
}

/* ── APPLY FILTERS ──────────────────────────────────── */
function applyFilters() {
  const chip = document.getElementById('filterChip');
  if (chip) chip.textContent = buildFilterChip();

  const filtered = getFilteredDates();

  const sg = document.getElementById('statGrid');
  if (sg) sg.outerHTML = '<div id="statGrid">' + renderStatGrid(filtered) + '</div>';
  const sg2 = document.getElementById('statGrid');
  if (sg2) sg2.innerHTML = renderStatGrid(filtered);

  const opp = document.getElementById('weeklyOpp');
  if (opp) { opp.innerHTML = renderWeeklyOpportunity(filtered); wireOppSort(); }

  const va = document.getElementById('venueAvgs');
  if (va) va.innerHTML = renderVenueAvgCards(filtered);

  const dc = document.getElementById('dateCards');
  if (dc) dc.innerHTML = renderDateCards(filtered);
}

/* ── INIT ───────────────────────────────────────────── */
async function init() {
  try {
    const [eSBData, edgeData, summitData, totrData, metaRes] = await Promise.all([
      fetch('data/prices_latest_esb.json',  { cache: 'no-store' }).then(r => r.json()),
      fetch('data/prices_latest_edge.json', { cache: 'no-store' }).then(r => r.json()),
      fetch('data/prices_latest_summit.json', { cache: 'no-store' }).then(r => r.json()),
      fetch('data/prices_latest_totr.json', { cache: 'no-store' }).then(r => r.json()),
      fetch('data/meta.json',               { cache: 'no-store' }).then(r => r.json()),
    ]);

    DATA      = { esb: eSBData, edge: edgeData, summit: summitData, totr: totrData };
    META_DATA = metaRes;

    buildIndex();

    // Update timestamps
    const ts = META_DATA?.built_at || META_DATA?.scrape_date || null;
    if (ts) {
      const label = new Date(ts).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
      const el = document.getElementById('sidebarTs');
      if (el) el.textContent = 'Last updated: ' + label;
      const dt = document.getElementById('topbarDate');
      if (dt) dt.textContent = label;
    }

    const filtered = getFilteredDates();

    document.getElementById('pageContent').innerHTML = `
      ${buildFilterBar()}
      <div id="venueAvgs">${renderVenueAvgCards(filtered)}</div>
      <div id="statGrid">${renderStatGrid(filtered)}</div>
      <div id="weeklyOpp">${renderWeeklyOpportunity(filtered)}</div>
      <div id="dateCards">${renderDateCards(filtered)}</div>
    `;

    wireOppSort();

  } catch (err) {
    console.error('Sunset init error:', err);
    document.getElementById('pageContent').innerHTML = `
      <div class="loading-state" style="color:var(--down);">
        Data load failed. Verify data files are accessible.
        <span style="font-size:11px;color:var(--text-dim);">${esc(String(err))}</span>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
